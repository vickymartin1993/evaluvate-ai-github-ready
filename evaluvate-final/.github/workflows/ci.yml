# ============================================================
# CI Workflow — Evaluvate AI
# Runs on: every pull request to main, every push to main
#
# What it does:
#   1. Lint — catches code style issues
#   2. Type-check — catches TypeScript errors without building
#   3. Unit tests — runs Vitest tests for frontend and backend
#   4. Build — confirms the frontend bundles without errors
#
# Secrets used: NONE (CI only checks code, does not deploy)
# Secrets for deployment are in deploy.yml instead.
# ============================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Job 1: Frontend checks ────────────────────────────────
  frontend:
    name: Frontend — Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          # Cache based on the frontend lockfile so installs are fast
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        # 'npm ci' is stricter than 'npm install' — it fails if lockfile is out of date

      # Create a minimal .env for CI — feature flags all false so no real API calls
      - name: Create .env for CI
        run: |
          cat <<EOF > .env.local
          VITE_API_BASE_URL=http://localhost:7071/api
          VITE_FEATURE_REAL_UPLOAD=false
          VITE_FEATURE_REAL_SCORING=false
          VITE_FEATURE_REAL_AUTH=false
          VITE_POC_SCHOOL_ID=school_ci_test
          EOF

      - name: Lint
        run: npm run lint
        # Uses eslint.config.js — fails on any ESLint error

      - name: Type-check
        run: npx tsc --noEmit
        # Checks TypeScript without emitting files — fast and catches type errors

      - name: Run unit tests
        run: npm run test
        # Runs Vitest — if tests fail, PR cannot be merged

      - name: Build
        run: npm run build
        # Confirms Vite can bundle the app — catches import errors and missing vars
        env:
          # Vite needs VITE_ vars at build time — provide safe CI values
          VITE_API_BASE_URL: "http://localhost:7071/api"
          VITE_FEATURE_REAL_UPLOAD: "false"
          VITE_FEATURE_REAL_SCORING: "false"
          VITE_FEATURE_REAL_AUTH: "false"
          VITE_POC_SCHOOL_ID: "school_ci_test"

  # ── Job 2: Backend checks ─────────────────────────────────
  backend:
    name: Backend — Typecheck and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Type-check backend
        working-directory: backend
        run: npx tsc --noEmit

      - name: Run backend unit tests
        working-directory: backend
        run: npm run test
        # Backend tests use Vitest with mocked Cosmos/Gemini clients
        # No real API keys needed in CI — all external calls are mocked
